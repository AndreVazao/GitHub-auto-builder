name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # REMOVENDO O CACHE para evitar erro de lock file

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-package-lock
          # --no-package-lock evita criar o arquivo lock

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: 'latest'
          eas-version: 'latest'
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create eas.json
        run: |
          cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 3.0.0",
              "appVersionSource": "remote"
            },
            "build": {
              "preview": {
                "android": {
                  "buildType": "apk"
                },
                "node": "20"
              }
            }
          }
          EOF

      - name: Create assets folder
        run: |
          mkdir -p assets
          echo "placeholder" > assets/.gitkeep

      - name: Build Android APK
        run: eas build -p android --profile preview --non-interactive --local
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Find and upload APK
        id: find-apk
        run: |
          APK_PATH=$(find . -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-auto-builder-app
          path: ${{ steps.find-apk.outputs.apk-path }}
          if-no-files-found: error
          retention-days: 90
