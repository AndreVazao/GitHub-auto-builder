name: EAS Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Trigger Android build on EAS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate files
        run: |
          test -f package.json
          test -f app.json
          test -f eas.json

      - name: Show Expo config
        run: npx expo config --json
        env:
          NODE_ENV: production

      - name: Trigger Android build
        run: npx eas-cli build --platform android --profile preview --non-interactive --no-wait
        env:
          NODE_ENV: production
