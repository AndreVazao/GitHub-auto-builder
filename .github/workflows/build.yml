name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (without lock file)
        run: |
          npm install --legacy-peer-deps
          # Isso cria o package-lock.json automaticamente

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Create eas.json if not exists
        run: |
          if [ ! -f eas.json ]; then
            echo '{
              "cli": {
                "version": ">= 3.0.0"
              },
              "build": {
                "preview": {
                  "android": {
                    "buildType": "apk"
                  }
                }
              },
              "submit": {
                "production": {}
              }
            }' > eas.json
          fi

      - name: Build Android APK
        run: eas build -p android --profile preview --non-interactive --local
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Find APK file
        id: find-apk
        run: |
          APK_PATH=$(find . -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-auto-builder-app
          path: ${{ steps.find-apk.outputs.apk-path }}
          if-no-files-found: error
          retention-days: 90
